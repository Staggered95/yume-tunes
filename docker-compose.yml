services:
  # 1. The Database (Just Postgres stuff here!)
  db:
    image: postgres:15-alpine
    container_name: yumetunes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432" # Note: Default internal postgres port is 5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. The Node.js Backend (Cloudinary goes here!)
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: yumetunes-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./.env 
    environment:
      # Explicitly pass the Cloudinary keys to Node.js!
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - db
    volumes:
      - ./public:/public

  # 3. The React Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: yumetunes-web
    restart: unless-stopped
    ports:
      - "80:80"     
      - "443:443"   
    volumes:
      - ./public:/usr/share/nginx/html/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
  
volumes:
  pgdata: