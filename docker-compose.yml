services:
  # 1. The Database
  db:
    image: postgres:15-alpine
    container_name: yumetunes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "5433:${DB_PORT}"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. The Node.js Backend
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: yumetunes-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./.env 
    depends_on:
      - db
    volumes:
      # Maps your Arch 'public' folder into the API container
      # Adjust '/app/public' to wherever your Node.js code saves file uploads!
      - ./public:/public

  # 3. The React Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: yumetunes-web
    restart: unless-stopped
    ports:
      - "80:80"     # Keep 80 open for redirects
      - "443:443"   # NEW: Open the secure HTTPS port!
    volumes:
      - ./public:/usr/share/nginx/html/media:ro
      # NEW: Poke a hole for the SSL certificates!
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
  
volumes:
  pgdata:
