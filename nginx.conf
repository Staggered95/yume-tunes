server {
    listen 80;
    server_name yumetunes.duckdns.org;
    
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yumetunes.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/yumetunes.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yumetunes.duckdns.org/privkey.pem;
    client_max_body_size 50M;
    
    location /api/ {
        
        proxy_pass http://api:5000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    location /audio/ {
        alias /usr/share/nginx/html/media/audio/;
        add_header Accept-Ranges bytes; 
    }
}