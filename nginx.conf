# 1. THE INSECURE CATCHER
server {
    listen 80;
    server_name yumetunes.duckdns.org;
    
    # If anyone tries to use HTTP, immediately redirect them to HTTPS
    return 301 https://$host$request_uri;
}

# 2. THE SECURE BOUNCER
server {
    listen 443 ssl;
    server_name yumetunes.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/yumetunes.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yumetunes.duckdns.org/privkey.pem;
    client_max_body_size 50M;
    # ==========================================
    # NEW: The API Middleman
    # ==========================================
    location /api/ {
        # The trailing slash is MAGIC. It strips "/api/" from the URL 
        # before handing it to your Express app!
        # So a request for /api/home/data becomes just /home/data for Node.
        proxy_pass http://api:5000/;
        
        # These headers ensure your Express app knows the real IP of the user
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Your existing React rule
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # Your existing Audio rule
    location /audio/ {
        alias /usr/share/nginx/html/media/audio/;
        add_header Accept-Ranges bytes; 
    }
}